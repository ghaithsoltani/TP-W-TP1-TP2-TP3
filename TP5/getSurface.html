<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
     const getSurface = function getSurface(base, hauteur){
        return (base * hauteur) / 2;
     };

     let base = parseFloat(prompt("Entrez la base du triangle :"));
     let hauteur = parseFloat(prompt("Entrez la hauteur du triangle :"));   

     let surface = getSurface(base, hauteur);

     alert("La surface du triangle est : " + surface);
    

    

    </script>
</body>
</html>
